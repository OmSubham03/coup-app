<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Coup Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020617;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
.t{font-size:32px;font-weight:900;letter-spacing:2px;margin-bottom:20px;background:linear-gradient(135deg,#f59e0b,#22c55e,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.s{width:36px;height:36px;border:3px solid #1e293b;border-top-color:#f59e0b;border-radius:50%;animation:r .8s linear infinite;will-change:transform}
.p{color:#94a3b8;font-size:14px;margin-top:16px;text-align:center}
@keyframes r{to{transform:rotate(360deg)}}
</style></head>
<body><div class="t">COUP GAMES</div><div class="s"></div><div class="p">Loading game...</div></body>
</html>
